workflows:
  ios-testflight:
    name: Bindi iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - firebase        # Codemagic UI'dan tanımlanacak: GOOGLE_SERVICE_INFO_PLIST_B64, GOOGLE_SERVICES_JSON_B64
      vars:
        BUNDLE_ID: "com.gvn.bindi"
        XCODE_WORKSPACE: "Bindi.xcworkspace"
        XCODE_SCHEME: "Bindi"
      node: 20.11.0
      xcode: latest
      cocoapods: default
      # Manual signing: env grubundaki BINDI_P12_B64 + BINDI_PROVISION_B64 kullanılıyor
    integrations:
      app_store_connect: bindi-asc-key   # TestFlight upload için hala gerekli
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9
      - name: Install workspace dependencies
        script: |
          pnpm install --frozen-lockfile
      - name: Restore Firebase configs (from encrypted env)
        working_directory: apps/mobile
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > google-services.json
      - name: Expo prebuild
        working_directory: apps/mobile
        script: |
          npx expo prebuild --platform ios --clean --no-install
      - name: Pod install
        working_directory: apps/mobile/ios
        script: |
          pod install --repo-update
      - name: Increment build number
        working_directory: apps/mobile/ios
        script: |
          BUILD_NUMBER=$(($(date +%s) % 1000000))
          agvtool new-version -all $BUILD_NUMBER
      - name: Set up manual code signing
        script: |
          # Decode cert & profile from env
          echo "$BINDI_P12_B64" | base64 --decode > /tmp/bindi.p12
          echo "$BINDI_PROVISION_B64" | base64 --decode > /tmp/bindi.mobileprovision
          # Init keychain + add cert
          keychain initialize
          keychain add-certificates \
            --certificate /tmp/bindi.p12 \
            --certificate-password "$BINDI_P12_PASSWORD"
          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(security cms -D -i /tmp/bindi.mobileprovision | plutil -extract UUID xml1 -o - - | sed -n 's|.*<string>\(.*\)</string>.*|\1|p')
          cp /tmp/bindi.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Profile installed with UUID: $UUID"
          xcode-project use-profiles
      - name: Build IPA
        working_directory: apps/mobile/ios
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - apps/mobile/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - guvenlevent@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
